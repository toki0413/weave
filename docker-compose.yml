version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cg-backend
    ports:
      - "8004:8004"
    environment:
      - CG_PORT=8004
      - CG_HOST=0.0.0.0
    volumes:
      - cg_data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cg-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - "with-nginx"

volumes:
  cg_data:
